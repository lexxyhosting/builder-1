name: Flutter Build APK

# Action ini bisa di-trigger dari luar via API (repository_dispatch)
on:
  repository_dispatch:
    types: [build_apk]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # Setup Java (Syarat wajib untuk build Android)
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      # Setup environment Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0' # Sesuaikan dengan versi yang dipakai
          channel: 'stable'

      # Download ZIP dari URL yang dikirim bot Telegram kamu
      - name: Download User ZIP
        run: |
          curl -L "${{ github.event.client_payload.zip_url }}" -o project.zip
          unzip project.zip -d app_source
          
      # Proses Build APK
      - name: Build APK
        working-directory: ./app_source
        run: |
          flutter pub get
          flutter build apk --release
          
      # Upload hasil APK sebagai Artifact agar bisa didownload bot
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: app-release
          path: app_source/build/app/outputs/flutter-apk/app-release.apk
